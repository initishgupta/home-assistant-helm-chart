# Default values for home-assistant.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Override the namespace
# @default -- `.Release.Namespace`
namespaceOverride: ""

# Number of replicas for the deployment
replicaCount: 1

# Image settings
image:
  # Repository for the Home Assistant image
  repository: ghcr.io/home-assistant/home-assistant
  # Image pull policy
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# List of imagePullSecrets for private image repositories
imagePullSecrets: []
# Override the default name of the Helm chart
nameOverride: ""
# Override the default full name of the Helm chart
fullnameOverride: ""

# Service account settings
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Labels to add to all resources
commonLabels: {}
  # app.kubernetes.io/part-of: home-automation

# Annotations to add to the pod
podAnnotations: {}

# Pod security context settings
podSecurityContext:
  {}
  # runAsUser: 568
  # runAsGroup: 568
  # fsGroup: 568
  # fsGroupChangePolicy: "OnRootMismatch"

# Environment variables
env:
 - name: PUSHOVER_APP_KEY
   valueFrom:
     secretKeyRef:
       name: pushover-app-key
       key: pushover-app
 - name: PUSHOVER_USER_KEY
   valueFrom:
     secretKeyRef:
       name: pushover-user-key
       key: pushover-user
# - name: TZ
#   value: Europe/Prague
# - name: SOME_VAR_FROM_CONFIG_MAP
#   valueFrom:
#     configMapRef:
#       name: configmap-name
#       key: config-key
# - name: SOME_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: secret-name
#       key: secret-key

# Use environment variables from ConfigMaps or Secrets
envFrom: []
# - configMapRef:
#     name: config-map-name
# - secretRef:
#     name: secret-name

hostPort:
  # Enable 'hostPort' or not
  enabled: true
  port: 8123

# Specifies if the containers should be started in hostNetwork mode.
#
# Required for use auto-discovery feature of Home Assistant
hostNetwork: true

# Set pod self-perceived hostname (leave empty for default behavior).
hostname: ""

# Set the dnsPolicy (you'll want ClusterFirstWithHostNet if running on hostNetwork to reac
# other k8s services via DNS
dnsPolicy: ClusterFirstWithHostNet

# Container security context settings
securityContext:
  privileged: true
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Pod's DNS Configuration
# https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
# This value is useful if you need to reduce the DNS load: set "ndots" to 0 and only use FQDNs.
dnsConfig: {}
  # nameservers:
  #   - 1.2.3.4
  # searches:
  #   - ns1.svc.cluster-domain.example
  #   - my.dns.search.suffix
  # options:
  #   - name: ndots
  #     value: "2"

# Service settings
service:
  # Service type (ClusterIP, NodePort, LoadBalancer, or ExternalName)
  type: NodePort
  # Service port
  port: 8123
  nodePort: 31234
  # Annotations to add to the service
  annotations: {}

# Ingress settings
ingress:
  # Enable ingress for home assistant
  enabled: false
  # Enable external ingress (cannot be true when ingress.enabled is true)
  external: false
  className: ""
  labels: {}
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Additional ingresses for exposing Home Assistant on different paths/hosts
# Useful for IoT devices that don't support TLS or need specific path routing
additionalIngresses: []
#  - name: dlna
#    className: ""
#    labels: {}
#    annotations: {}
#    rules:
#      - host: ""  # Optional: omit for path-only routing
#        paths:
#          - path: /notify
#            pathType: Prefix
#            serviceName: ""  # Optional: defaults to main HA service
#            servicePort: ""  # Optional: defaults to service.port
#    tls: []

# Resource settings for the container
resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Node selector settings for scheduling the pod on specific nodes
nodeSelector: {}

# Tolerations settings for scheduling the pod based on node taints
tolerations: []

# Affinity settings for controlling pod scheduling
affinity: {}

# Set a priorityClassName on Home Assistant pods
priorityClassName: ""

initContainers:
  # Wait for DNS to be reachable before starting HA. With hostNetwork=true,
  # the pod often starts before kube-dns is reachable, causing integrations
  # like pushover/opower/met.no to fail their one-shot startup validation.
  - name: wait-for-dns
    image: busybox:1.37
    command: ["/bin/sh", "-c"]
    args:
      - |
        for i in $(seq 1 60); do
          if nslookup api.pushover.net >/dev/null 2>&1; then
            echo "DNS ready after ${i}s"; exit 0
          fi
          echo "Waiting for DNS... ($i/60)"; sleep 1
        done
        echo "DNS not ready after 60s, continuing anyway"; exit 0
# Example of integrating a custom component before starting the Home Assistant container
# Uses emptyDir custom-components, see below
# - name: init-panasonic-cc
