livenessProbe:
  exec:
    command:
    - /bin/sh
    - -c
    - |
      # Combined liveness check: HTTP responsive AND ZHA EZSP heartbeat fresh.
      # ZHA self-heal automation handles software-recoverable failures via Pushover.
      # This probe is the LAST RESORT for bellows-event-loop-closed and similar
      # process-level wedges that require a full Python interpreter restart.
      #
      # Returns 0 (healthy) if:
      #   - HTTP / responds (any status, even 405) AND
      #   - EZSP MAC RX broadcast counter has updated within last 900 seconds (15 min)
      # Returns 1 (unhealthy = restart) only if BOTH:
      #   - HTTP unreachable OR
      #   - DB query succeeds AND counter is stale >900s
      # Returns 0 if DB query fails (don't restart on transient SQLite locks)
      # Returns 0 if sensor row doesn't exist (don't restart if user disables it)
      set -e
      # HTTP check
      curl -fsS -o /dev/null -m 5 http://127.0.0.1:8123/ || \
        curl -fsS -o /dev/null -m 5 -X OPTIONS http://127.0.0.1:8123/ || exit 1
      # ZHA heartbeat check (graceful: only fails if we KNOW it's stale)
      python3 -c "
      import sqlite3, sys, time
      try:
          c = sqlite3.connect('/config/home-assistant_v2.db', timeout=5)
          cur = c.cursor()
          cur.execute(\"SELECT s.last_updated_ts FROM states s JOIN states_meta m ON s.metadata_id=m.metadata_id WHERE m.entity_id='sensor.generic_zigbee_coordinator_ezsp_mac_rx_broadcast' ORDER BY s.last_updated_ts DESC LIMIT 1\")
          r = cur.fetchone()
          if r is None:
              sys.exit(0)
          age = time.time() - r[0]
          if age > 900:
              print(f'EZSP heartbeat stale: {int(age)}s', file=sys.stderr)
              sys.exit(1)
          sys.exit(0)
      except Exception as e:
          print(f'probe-skip: {e}', file=sys.stderr)
          sys.exit(0)
      "
  initialDelaySeconds: 600
  periodSeconds: 60
  timeoutSeconds: 15
  failureThreshold: 5
  successThreshold: 1
readinessProbe:
  failureThreshold: 3
  httpGet:
    path: /
    port: http
    scheme: HTTP
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 1
startupProbe: {}
  # initialDelaySeconds: 1
  # periodSeconds: 5
  # timeoutSeconds: 1
  # successThreshold: 1
  # failureThreshold: 1
  # httpGet:
